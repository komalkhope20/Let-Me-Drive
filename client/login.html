<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Let Me Drive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span class="logo-icon">🚗</span>
      LET ME <span>DRIVE</span>
    </a>
    <div class="navbar-links">
      <a href="register.html">Create Account</a>
    </div>
  </nav>

  <!-- AUTH PAGE -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">LET ME <span>DRIVE</span></div>
      <p class="auth-subtitle">Sign in to continue your journey</p>

      <!-- Role Selector -->
      <div class="role-selector">
        <div class="role-btn selected" data-role="driver" onclick="selectRole('driver')">
          <span class="role-btn-icon">🪪</span>
          <span class="role-btn-label">Driver</span>
        </div>
        <div class="role-btn" data-role="passenger" onclick="selectRole('passenger')">
          <span class="role-btn-icon">🚗</span>
          <span class="role-btn-label">Passenger</span>
        </div>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password" required />
        </div>

        <!-- Error message -->
        <div class="form-error show" id="loginError" style="display:none;"></div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn" style="margin-top:8px;">
          Sign In
        </button>
      </form>

      <div class="divider" style="margin-top:20px;">or</div>

      <p style="text-align:center;color:var(--text-muted);font-size:0.88rem;margin-top:16px;">
        Don't have an account?
        <a href="register.html" style="color:var(--accent);font-weight:700;">Create one free →</a>
      </p>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
</body>
</html>
