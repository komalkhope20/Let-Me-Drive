<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Let Me Drive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <span class="logo-icon">🚗</span>
      LET ME <span>DRIVE</span>
    </a>
    <div class="navbar-links">
      <a href="login.html">Already have an account? Sign In</a>
    </div>
  </nav>

  <!-- REGISTER PAGE -->
  <div class="auth-page" style="align-items:flex-start;padding-top:90px;">
    <div class="auth-card" style="max-width:580px;">
      <div class="auth-logo">LET ME <span>DRIVE</span></div>
      <p class="auth-subtitle">Create your account and get started</p>

      <!-- Role Selector -->
      <div class="role-selector">
        <div class="role-btn selected" data-role="driver" onclick="selectRole('driver')">
          <span class="role-btn-icon">🪪</span>
          <span class="role-btn-label">I'm a Driver</span>
        </div>
        <div class="role-btn" data-role="passenger" onclick="selectRole('passenger')">
          <span class="role-btn-icon">🚗</span>
          <span class="role-btn-label">I'm a Passenger</span>
        </div>
      </div>

      <!-- Registration Form -->
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">

        <!-- Common Fields -->
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" id="age" placeholder="25" min="18" max="80" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label class="form-label">Contact Number</label>
          <input type="tel" class="form-control" id="contact" placeholder="+91 98765 43210" required />
        </div>

        <!-- Driver-specific fields -->
        <div id="driverFields">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">License Number</label>
              <input type="text" class="form-control" id="licenseNumber" placeholder="MH01-1234567" />
            </div>
            <div class="form-group">
              <label class="form-label">Years of Experience</label>
              <input type="number" class="form-control" id="experience" placeholder="3" min="0" max="50" />
            </div>
          </div>
        </div>

        <!-- Passenger-specific fields -->
        <div id="passengerFields" style="display:none;">
          <div class="form-group">
            <label class="form-label">Car Type</label>
            <select class="form-control" id="carType">
              <option value="">Select your car type</option>
              <option value="Hatchback">Hatchback (e.g., Alto, Swift)</option>
              <option value="Sedan">Sedan (e.g., City, Verna)</option>
              <option value="SUV">SUV (e.g., Creta, Brezza)</option>
              <option value="Luxury">Luxury (e.g., Camry, Octavia)</option>
              <option value="MUV">MUV / MPV (e.g., Innova, Ertiga)</option>
              <option value="Electric">Electric Vehicle</option>
            </select>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Min. 6 characters" minlength="6" required />
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required />
          </div>
        </div>

        <!-- Error display -->
        <div id="registerError" style="color:var(--danger);font-size:0.85rem;display:none;"></div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn" style="margin-top:8px;">
          Create Account
        </button>
      </form>

      <div class="divider" style="margin-top:20px;">or</div>

      <p style="text-align:center;color:var(--text-muted);font-size:0.88rem;margin-top:16px;">
        Already have an account?
        <a href="login.html" style="color:var(--accent);font-weight:700;">Sign in →</a>
      </p>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="utils.js"></script>
  <script src="auth.js"></script>
</body>
</html>
